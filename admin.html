<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI41 Blog Admin</title>
<link rel="icon" href="logo.png" type="image/png">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <main class="admin-wrap">
    <header class="admin-head">
      <a href="/" class="admin-brand"><img src="logo.png" width="28" height="28" alt=""> AI41 Admin</a>
      <p class="admin-note">블로그 CRUD · PIN 로그인 · 공개 사이트에는 링크하지 마세요.</p>
    </header>

    <section id="loginPanel" class="admin-card">
      <h1>관리자 로그인</h1>
      <label>ADMIN_PIN
        <input type="password" id="adminPin" autocomplete="current-password" />
      </label>
      <button type="button" id="loginBtn">로그인</button>
      <p class="admin-err" id="loginErr" hidden></p>
    </section>

    <section id="dashPanel" class="admin-dash" hidden>
      <div class="admin-toolbar">
        <button type="button" id="newPostBtn">새 글</button>
        <button type="button" id="refreshBtn" class="ghost">새로고침</button>
        <button type="button" id="logoutBtn" class="ghost">로그아웃</button>
      </div>
      <div class="admin-layout">
        <div class="admin-card">
          <h2>게시글</h2>
          <ul id="postList" class="post-list"></ul>
        </div>
        <form id="postForm" class="admin-card" hidden>
          <h2 id="formTitle">글 편집</h2>
          <input type="hidden" id="postId" />
          <label>제목 <input id="fTitle" required /></label>
          <label>슬러그 <input id="fSlug" placeholder="자동 생성 가능" /></label>
          <label>요약 <input id="fSummary" /></label>
          <label>썸네일 URL <input id="fThumb" placeholder="/logo.png 또는 https://..." /></label>
          <label>상태
            <select id="fStatus">
              <option value="draft">draft</option>
              <option value="published">published</option>
            </select>
          </label>
          <label>본문 <textarea id="fBody" rows="12"></textarea></label>
          <div class="admin-form-actions">
            <button type="submit">저장</button>
            <button type="button" id="deleteBtn" class="danger">삭제</button>
            <button type="button" id="cancelBtn" class="ghost">취소</button>
          </div>
          <p class="admin-err" id="formErr" hidden></p>
        </form>
      </div>
    </section>
  </main>
  <script src="js/admin.js"></script>
</body>
</html>
